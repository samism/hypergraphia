name: Hypergraphia
options:
  bundleIdPrefix: com.sabotage
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  fileTypes:
    icon:
      file: true

packages:
  cmark-gfm:
    url: https://github.com/brokenhandsio/cmark-gfm.git
    from: "2.1.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.1.0"
  HypergraphiaCore:
    path: Packages/HypergraphiaCore

targets:
  Hypergraphia:
    type: application
    platform: macOS
    sources:
      - path: Hypergraphia
        excludes:
          - "iOS/**"
      - path: Shared/Resources/mermaid.min.js
        buildPhase: resources
      - path: Shared/Resources/svg-pan-zoom.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.css
        buildPhase: resources
      - path: Shared/Resources/fonts
        buildPhase: resources
        type: folder
      - path: Shared/Resources/highlight.min.js
        buildPhase: resources
      - path: Shared/Resources/highlight-theme.css
        buildPhase: resources
      - path: Shared/Resources/demo.md
        buildPhase: resources
      - path: Shared/Resources/getting-started.md
        buildPhase: resources
    dependencies:
      - package: HypergraphiaCore
      - package: cmark-gfm
        product: cmark
      - package: Sparkle
      - package: KeyboardShortcuts
      - target: HypergraphiaQuickLook
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly
        PRODUCT_NAME: Hypergraphia
        MARKETING_VERSION: "3.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Hypergraphia/Hypergraphia.entitlements
        INFOPLIST_FILE: Hypergraphia/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: W33JZPPPFN
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.samism.clearly.dev
          PRODUCT_NAME: "Hypergraphia Dev"
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
        Release:
          CODE_SIGN_STYLE: Automatic

  Hypergraphia-iOS:
    type: application
    platform: iOS
    sources:
      - path: Hypergraphia/iOS
        excludes:
          - "PreviewExtension/**"
          - "ThumbnailExtension/**"
      - path: Hypergraphia/MarkdownDocument.swift
      - path: Hypergraphia/AppIcon.icon
      - path: Shared/Resources/mermaid.min.js
        buildPhase: resources
      - path: Shared/Resources/svg-pan-zoom.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.css
        buildPhase: resources
      - path: Shared/Resources/fonts
        buildPhase: resources
        type: folder
      - path: Shared/Resources/highlight.min.js
        buildPhase: resources
      - path: Shared/Resources/highlight-theme.css
        buildPhase: resources
    dependencies:
      - package: HypergraphiaCore
      - target: HypergraphiaPreview-iOS
        embed: true
      - target: HypergraphiaThumbnail-iOS
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly
        PRODUCT_NAME: Hypergraphia
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: Hypergraphia/iOS/Hypergraphia-iOS.entitlements
        INFOPLIST_FILE: Hypergraphia/iOS/Info-iOS.plist
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: W33JZPPPFN
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # iOS releases independently from Mac — see CLAUDE.md "Versioning"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly.dev
          PRODUCT_NAME: "Hypergraphia Dev"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic

  HypergraphiaQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: HypergraphiaQuickLook
      - path: Shared/Resources/mermaid.min.js
        buildPhase: resources
      - path: Shared/Resources/svg-pan-zoom.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.css
        buildPhase: resources
      - path: Shared/Resources/fonts
        buildPhase: resources
        type: folder
      - path: Shared/Resources/highlight.min.js
        buildPhase: resources
      - path: Shared/Resources/highlight-theme.css
        buildPhase: resources
    dependencies:
      - package: HypergraphiaCore
      - package: cmark-gfm
        product: cmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly.quicklook
        PRODUCT_NAME: HypergraphiaQuickLook
        MARKETING_VERSION: "3.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: HypergraphiaQuickLook/HypergraphiaQuickLook.entitlements
        INFOPLIST_FILE: HypergraphiaQuickLook/Info.plist
        DEVELOPMENT_TEAM: W33JZPPPFN
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.samism.clearly.dev.quicklook
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
        Release:
          CODE_SIGN_STYLE: Automatic

  HypergraphiaPreview-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Hypergraphia/iOS/PreviewExtension
      - path: Shared/Resources/mermaid.min.js
        buildPhase: resources
      - path: Shared/Resources/svg-pan-zoom.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.js
        buildPhase: resources
      - path: Shared/Resources/katex.min.css
        buildPhase: resources
      - path: Shared/Resources/fonts
        buildPhase: resources
        type: folder
      - path: Shared/Resources/highlight.min.js
        buildPhase: resources
      - path: Shared/Resources/highlight-theme.css
        buildPhase: resources
    dependencies:
      - package: HypergraphiaCore
      - package: cmark-gfm
        product: cmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly.preview
        PRODUCT_NAME: HypergraphiaPreview
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Hypergraphia/iOS/PreviewExtension/HypergraphiaPreview.entitlements
        INFOPLIST_FILE: Hypergraphia/iOS/PreviewExtension/Info.plist
        DEVELOPMENT_TEAM: W33JZPPPFN
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly.dev.preview
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic

  HypergraphiaThumbnail-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Hypergraphia/iOS/ThumbnailExtension
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly.thumbnail
        PRODUCT_NAME: HypergraphiaThumbnail
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Hypergraphia/iOS/ThumbnailExtension/HypergraphiaThumbnail.entitlements
        INFOPLIST_FILE: Hypergraphia/iOS/ThumbnailExtension/Info.plist
        DEVELOPMENT_TEAM: W33JZPPPFN
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.sabotage.clearly.dev.thumbnail
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic
