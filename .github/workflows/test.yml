name: Test

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app-macos:
    name: Build Mac app (Debug)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pinned: Xcode 26.3 + macos-15 runner crashes ibtoold during
          # AppIcon.icon (Icon Composer) compile with dyld AVFCore symbol
          # mismatches. 26.2 builds the .icon asset cleanly.
          xcode-version: "26.2"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData and SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-app-macos-${{ hashFiles('project.yml', 'Packages/HypergraphiaCore/**/*.swift', 'Packages/HypergraphiaCore/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-app-macos-

      - name: Build Hypergraphia (Mac, Debug)
        # Skip the AppIcon.icon (Icon Composer) asset compile in CI: ibtoold
        # crashes on the macos-15 runner image due to dyld AVFCore symbol
        # mismatches. The Swift code still compiles fully — only the icon is
        # skipped, which we don't ship from CI anyway.
        run: |
          xcodebuild \
            -scheme Hypergraphia \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            EXCLUDED_SOURCE_FILE_NAMES="AppIcon.icon" \
            build -quiet

  build-app-ios:
    name: Build iOS app (Debug)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pinned: Xcode 26.3 + macos-15 runner crashes ibtoold during
          # AppIcon.icon (Icon Composer) compile with dyld AVFCore symbol
          # mismatches. 26.2 builds the .icon asset cleanly.
          xcode-version: "26.2"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData and SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-app-ios-${{ hashFiles('project.yml', 'Packages/HypergraphiaCore/**/*.swift', 'Packages/HypergraphiaCore/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-app-ios-

      - name: Build Hypergraphia-iOS (iPhone simulator, Debug)
        # Skip the AppIcon.icon asset compile in CI — see Mac build job above.
        # Use generic iOS Simulator destination so the build doesn't depend on
        # a specific named device being pre-installed on the runner image.
        run: |
          xcodebuild \
            -scheme Hypergraphia-iOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            EXCLUDED_SOURCE_FILE_NAMES="AppIcon.icon" \
            build -quiet
